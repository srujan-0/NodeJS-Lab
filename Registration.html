<html>
    <head>
       <title>Register</title>
    </head>
<body>
  <form name="register" method="post">
  <table align="center" bgcolor="#F0F0F0" border="1px solidblack">
      <caption><h> Registration page</h></caption>
       <tr>
         <td>Username</td>
         <td><input type="text" name="usrname"></td>
</tr>
<tr>
  <td>Password</td>
  <td><input type="password" name="pwd"></td>
</tr>
<tr>
  <td>E-mail</td>
  <td><input type="text" name="email"></td>
</tr>
<tr>
  <td>Phone Number</td>
  <td><input type="text" name="phno" size="12" maxlength="10"></td>
</tr>
<tr>
  <td>Gender</td>
  <td><input type="radio" name="gender" checked> male &nbsp;
<input type="radio" name="gender"> female </td>
</tr>
<tr>
  <td>Date Of Birth</td>
  <td><input type="date" name ="dob"></td>
</tr>
<tr>
  <td>Languages known</td>
  <td><input type="checkbox" name="chkEng" checked>English &nbsp;
      <input type="checkbox" name="chkHin">Hindi &nbsp;
      <input type="checkbox" name="chkTel">Telugu &nbsp;
      <input type="checkbox" name="chkTam">Tamil &nbsp;</td>
</tr>
<tr>
  <td><select name="states">
  <option value="Telangana">TS</option>
  <option value="AP">AP</option>
  <option value="MP">MP</option>
  <option value="Karnataka">Karnataka</option>
  <option value="TamilNadu">TN</option>
  </select></td>
  <td><select name="dist">
  <option value="Hyderabad">Hyderabad</option>
  <option value="Warangal">Warangal</option>
  <option value="Rangareddy">Rangareddy</option>
  <option value="Karimnagar">Karimnagar</option>
  <option value="Nalagonda">Nalagonda</option>
  </select></td>
</tr>
<tr>
  <td>Address</td>
  <td><textarea rows="5" cols="20" name="Address"></textarea></td>
</tr>
<tr>
  <td colspan="2" align="center">
  <input type="submit" value="Register">&nbsp;
  <input type="reset" Value="Reset">
  </td>
</tr>
</table>
</body>
</html>
